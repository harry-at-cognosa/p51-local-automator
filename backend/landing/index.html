<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local Automator by CogWrite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="/app/favicon.png">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #222222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 1.5rem;
      text-align: center;
    }

    .logo-row {
      display: flex;
      gap: 4rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .logo-link img {
      width: 200px;
      max-width: 40vw;
      height: auto;
      display: block;
    }

    .status-text {
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .button-row {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .cta-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      padding: 0.75rem 2.5rem;
      border-radius: 999px;
      border: 3px solid #cc0000;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      color: #222222;
      background-color: #ffffff;
      min-width: 180px;
    }

    .cta-btn:hover,
    .cta-btn:focus-visible {
      background-color: #ffecec;
    }

    .tagline {
      font-size: 1rem;
      margin-top: 0.25rem;
    }

    footer {
      border-top: 1px solid #eeeeee;
      padding: 0.75rem 0 1rem;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="logo-row">
      <a class="logo-link" href="https://cogwrite.ai/blog" target="_blank" rel="noopener noreferrer">
        <img src="/landing/images/p51_icon_512sq.png" alt="Local Automator by CogWrite logo">
      </a>

      <a class="logo-link" href="https://cogwrite.ai/" target="_blank" rel="noopener noreferrer">
        <img src="/landing/images/cogwrite-semantic-Technologies-600x600_4.png" alt="CogWrite Semantic Technologies logo">
      </a>
    </div>

    <div class="status-text">
      You are not logged in.
    </div>

    <div class="button-row">
      <a class="cta-btn" href="/app/login">
        Login
      </a>

      <a class="cta-btn" href="https://cogwrite.ai/contact" target="_blank" rel="noopener noreferrer">
        Contact Us to sign up
      </a>
    </div>

    <div class="tagline">
      Start your journey with time-saving, low-cost Agentic AI today!
    </div>
  </main>

  <footer>
    &copy; 2026 CogWrite Semantic Technologies
  </footer>
</body>
</html>
